name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Tests
        run: python -m unittest discover -s tests

      - name: Compile
        run: python -m compileall src tests examples

      - name: Docs
        run: mkdocs build --strict

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m venv /tmp/runbook-wheel-smoke
          /tmp/runbook-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/runbook-wheel-smoke/bin/python -c "import importlib.metadata as m; import runbook; assert m.version('runbook') == '0.1.0'; assert runbook.Runbook('ok').execute({}).passed"
